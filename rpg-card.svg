                <text x="30" y="17" class="text lvl-text" text-anchor="middle">LVL 03</text>
                <text x="75" y="17" class="text label" style="fill: #8b949e;">Class: <tspan style="fill: #ffffff;">Full-Stack Mage</tspan></text>
            </g>
        </g>
    </g>

    <line x1="40" y1="150" x2="800" y2="150" stroke="#333" stroke-dasharray="4 4"/>

