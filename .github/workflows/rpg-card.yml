name: ⚔️ Update RPG Character Card

on:
  schedule:
    - cron: "0 0 * * *"   # runs every day at midnight UTC
  workflow_dispatch:        # allows manual trigger from Actions tab
  push:
    branches: [main]

jobs:
  update-rpg-card:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests python-dotenv

      - name: Run RPG card generator
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: patrizzzz
        run: python scripts/generate_rpg_card.py

      - name: Commit and push if changed
        run: |
          git config --global user.name "rpg-card-bot"
          git config --global user.email "actions@github.com"
          git add README.md rpg-card.svg
          git diff --cached --quiet || git commit -m "⚔️ chore: update RPG character card [skip ci]"
          git push
